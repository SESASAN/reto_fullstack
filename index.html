<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OBSIDIAN — Tienda online" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap"
      rel="stylesheet"
    />

    <title>OBSIDIAN</title>
    <style>
      @keyframes float-orb-1 {
        0%, 100% { transform: translate(10vw, 10vh) scale(1); }
        33% { transform: translate(30vw, 30vh) scale(1.2); }
        66% { transform: translate(60vw, 20vh) scale(0.9); }
      }
      @keyframes float-orb-2 {
        0%, 100% { transform: translate(70vw, 40vh) scale(1); }
        33% { transform: translate(50vw, 60vh) scale(1.1); }
        66% { transform: translate(20vw, 50vh) scale(1); }
      }
    </style>
  </head>
  <body class="relative">
    <div style="position:fixed;inset:0;background:#111319;z-index:-4;"></div>
    <div style="position:fixed;top:0;left:0;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(142,127,255,1)0%,transparent 70%);filter:blur(80px);opacity:0.3;z-index:-3;pointer-events:none;animation:float-orb-1 25s ease-in-out infinite;"></div>
    <div style="position:fixed;top:0;left:0;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(199,191,255,0.8)0%,transparent 70%);filter:blur(80px);opacity:0.3;z-index:-3;pointer-events:none;animation:float-orb-2 30s ease-in-out infinite;"></div>
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
